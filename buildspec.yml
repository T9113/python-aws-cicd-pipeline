version: 0.2

env:
  parameter-store:
    SSH_KEY: "/prod/ec2/private_key"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Setting up secure SSH environment..."
      - mkdir -p ~/.ssh
      - echo "$SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      # Using a clean multi-line echo statement to bypass parsing bugs
      - echo "Host *" > ~/.ssh/config
      - echo "    StrictHostKeyChecking no" >> ~/.ssh/config
      - echo "Upgrading local environment dependencies..."
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Executing validation testing checks..."
      - pytest test_app.py

  build:
    commands:
      - echo "Syncing application repository with EC2 instance..."
      - rsync -avz -e "ssh -i ~/.ssh/id_rsa" --exclude '.git' ./ ubuntu@13.48.83.32:/home/ubuntu/app
      - echo "Executing server background environment refresh..."
      - ssh -i ~/.ssh/id_rsa ubuntu@13.48.83.32 "chmod +x /home/ubuntu/app/start_server.sh && /home/ubuntu/app/start_server.sh"